
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Todo Card</title>

  <!--stylesheet-->
  <link rel="stylesheet" href="stylesheet.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <article class="todo-card"
  data-testid="test-todo-card">
    
    <!--Title-->
    <h3 data-testid="test-todo-title" id="todo-title">Build UI Card</h3>

    <!---Description-->
    <div>
      <p id="todo-description" data-testid="test-todo-description"></p>

      <button
      data-testid="test-todo-expand-toggle"
      aria-expanded="false"
      aria-controls="desc-container"
      onclick="toggleDescription()">Expand</button>

      <div id="desc-container"
      data-testid="test-todo-collapsible-section"
      class="collapsed">
        Create a clean and testable todo card component with advanced interactivity and state handling
      </div>
    </div>
    

     <!---Priority-->
    <div>
      <select onchange="changePriority(this.value)">
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
      <span data-testid="test-todo-priority" id="priority">
      High
    </span>    
    </div>

   <div class="due ">

    <!---Status-->
    <select id="status-control"
    data-testid="test-todo-status-control" onchange="changeStatus(this.value)">
    <option value="overdue">Overdue</option>
    <option value="in progress">In Progress</option>
    <option value="done">Done</option></select>

     <!---Due date-->
    <time 
    id="due-date" 
    data-testid="test-todo-due-date"
    datetime=""></time>
    
<br><br>
    <!----Time----->
    <div id="time-remaining"
    data-testid="test-todo-overdue-indicator"
    aria-live="polite">
      Loading...
    </div>    
   </div>

    <!-----checkbox------->
    <label>
      <input type="checkbox"
      id="checkbox"
      data-testid="test-todo-complete-toggle">
      Complete
    </label>

    <!--Tags-->
    <ul data-testid="test-todo-tags">
      <li data-testid="test-todo-tag-work" class="tag">Work</li>
      <li data-testid="test-todo-tag-urgent" class="urgent">Urgent</li>
    </ul>

    <!--Buttons-->
    <button data-testid="test-todo-edit-button" 
    onclick="openEditMode()">
      <i class="fas fa-pen"></i>
    </button>

    <button 
    data-testid="test-todo-delete-button"
    onclick="deleteTask()"><i class="fas fa-trash"></i></button>

    <!--Edit form--->
    <div id="edit-form" data-testid="test-todo-edit-form" class="hidden">
      <input id="edit-title"
      data-testid="test-todo-edit-title-input" placeholder="Title"/>

      <textarea id="edit-desc"
      data-testid="test-todo-edit-description-input"></textarea>

      <select id="edit-priority"
      data-testid="test-todo-edit-priority-select">
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>

    <input type="datetime-local" id="edit-date"
    data-testid="test-todo-edit-due-date-input">

    <button data-testid="test-todo-save-button"
    onclick="saveEdit()">Save</button>
    <button
    data-testid="test-todo-cancel-button"
    onclick="cancelEdit()">Cancel</button>
    </div>
  </article>
  
  <script src="script.js"></script>
</body>
</html>
